services:
  postgres:
    image: postgres:18-alpine
    container_name: bridge-postgres
    environment:
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: bridge
      POSTGRES_DB: bridge
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bridge -d bridge']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bridge-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: bridge-ai/api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: bridge-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://bridge:bridge@postgres:5432/bridge
      REDIS_URL: redis://redis:6379
      BRIDGE_MASTER_KEY: ${BRIDGE_MASTER_KEY}
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - ./volumes/workspaces:/app/volumes/workspaces
      - ./volumes/obsidian:/app/volumes/obsidian
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - bridge-ai-projects

volumes:
  postgres_data:
  redis_data:

networks:
  bridge-ai-projects:
    name: bridge-ai-projects
    driver: bridge
    labels:
      bridge-ai.managed: 'true'
