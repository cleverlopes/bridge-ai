name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bridge
          POSTGRES_PASSWORD: bridge
          POSTGRES_DB: bridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bunx nx run-many --target=lint --all --parallel=4

      - name: Test (gsd-sdk)
        run: bun run test --coverage
        working-directory: packages/gsd-sdk
        env:
          NODE_ENV: test

      - name: Test (bridge-sdk)
        run: bun run test --coverage
        working-directory: packages/bridge-sdk
        env:
          NODE_ENV: test

      - name: Test (nest-core)
        run: bun run test:cov
        working-directory: packages/nest-core
        env:
          NODE_ENV: test
          BRIDGE_MASTER_KEY: dGVzdC1rZXktdGhpcy1pcy0zMi1ieXRlcy1sb25n
          DATABASE_URL: postgresql://bridge:bridge@localhost:5432/bridge_test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            packages/gsd-sdk/coverage/
            packages/bridge-sdk/coverage/
            packages/nest-core/coverage/
